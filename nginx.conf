server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker internal DNS — required for proxy_pass with variable
    resolver 127.0.0.11 valid=30s;

    # Variable enables lazy DNS resolution (nginx starts even if backend is down)
    set $backend "backend:8080";

    # NOTE: location blocks with add_header do NOT inherit these — they must repeat them
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # ─── Download file: GET /dl/{token}/file ───────────────────────────────
    # Must precede /dl/{token} block (more specific match first)
    location ~ ^/dl/([^/]+)/file$ {
        limit_req zone=dl_limit burst=5 nodelay;

        # Repeated — add_header inheritance does not cross location boundaries
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Robots-Tag "noindex, nofollow" always;

        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
    }

    # ─── Share metadata: GET /dl/{token} ───────────────────────────────────
    location ~ ^/dl/([^/]+)$ {
        limit_req zone=dl_limit burst=5 nodelay;

        # Repeated — add_header inheritance does not cross location boundaries
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Robots-Tag "noindex, nofollow" always;

        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;

        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
    }

    # ─── Block admin API and hub routes ────────────────────────────────────
    location /api/ { return 404; }
    location /hubs/ { return 404; }

    # ─── SPA fallback ──────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Cache hashed static assets ────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        # Repeated — add_header inheritance does not cross location boundaries
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Cache-Control "public, immutable";
    }
}
